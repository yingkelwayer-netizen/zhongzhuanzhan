name: Deploy to Aliyun ECS (Baota)

on:
  push:
    branches:
      - main # 监听 main 分支的推送

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码 (Checkout)
      uses: actions/checkout@v3

    - name: 设置 Node.js 环境
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 编译生成静态网页
      run: |
        node build.js

    - name: 部署到阿里云 ECS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        source: "index.html,style.css,assets/"
        target: "/www/wwwroot/zhongzhuanzhan"
